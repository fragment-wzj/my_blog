<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wzj_fragment | Blog</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #111827 45%, #1e293b);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 960px;
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 24px;
      padding: 56px 48px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }

    .tag {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.14);
      color: #93c5fd;
      font-size: 14px;
      letter-spacing: 0.08em;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(40px, 7vw, 72px);
      line-height: 1.05;
      margin-bottom: 18px;
      color: #f8fafc;
    }

    h1 span {
      color: #60a5fa;
    }

    .intro {
      font-size: 18px;
      line-height: 1.8;
      color: #cbd5e1;
      max-width: 720px;
      margin-bottom: 36px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 40px;
    }

    .card {
      background: rgba(30, 41, 59, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 18px;
      padding: 22px;
    }

    .card h2 {
      font-size: 18px;
      color: #f8fafc;
      margin-bottom: 10px;
    }

    .card p {
      color: #94a3b8;
      line-height: 1.7;
      font-size: 15px;
    }

    .footer {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(148, 163, 184, 0.14);
      padding-top: 24px;
    }

    .footer p {
      color: #94a3b8;
      font-size: 14px;
    }

    .button {
      display: inline-block;
      text-decoration: none;
      color: #0f172a;
      background: linear-gradient(135deg, #60a5fa, #22d3ee);
      padding: 12px 20px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 30px rgba(34, 211, 238, 0.25);
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(34, 211, 238, 0.35);
    }

    @media (max-width: 640px) {
      .container {
        padding: 36px 24px;
      }

      .intro {
        font-size: 16px;
      }

      .footer {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="tag">WELCOME TO MY BLOG</div>
    <h1>你好，我是 <span>wzj_fragment</span></h1>
    <p class="intro">
      19岁，深度学习与强化学习爱好者。这里会记录我的学习过程、思考笔记与实践心得。
      希望能和大家一起交流、一起成长、一起进步。
    </p>

    <section class="cards">
      <article class="card">
        <h2>研究兴趣</h2>
        <p>聚焦深度学习、强化学习，以及这些方法在真实问题中的应用与落地。</p>
      </article>
      <article class="card">
        <h2>博客内容</h2>
        <p>分享学习笔记、项目复盘、算法理解，以及一路上踩过的坑和收获。</p>
      </article>
      <article class="card">
        <h2>我的期待</h2>
        <p>希望认识更多志同道合的朋友，在交流中拓宽视野，在实践中持续精进。</p>
      </article>
    </section>

    <div class="footer">
      <p>Stay curious. Keep building. Grow together.</p>
      <a class="button" href="#">开始浏览</a>
    </div>
  </main>
</body>
</html>
