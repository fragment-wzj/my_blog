<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>吴子健 | wzj_fragment</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --subtext: #6b7280;
      --line: #e5e7eb;
      --accent: #4f46e5;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      --radius: 24px;
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f9fafb 0%, #eef2ff 100%);
      color: var(--text);
      line-height: 1.7;
    }

    .page {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 72px;
    }

    .hero {
      display: flex;
      gap: 28px;
      align-items: center;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: 32px;
      position: sticky;
      top: 20px;
      backdrop-filter: blur(10px);
      z-index: 10;
      margin-bottom: 32px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 4px solid #ffffff;
      box-shadow: 0 10px 30px rgba(79, 70, 229, 0.16);
      background: #fff;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile {
      min-width: 0;
    }

    .profile h1 {
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.15;
      margin-bottom: 6px;
      color: #111827;
    }

    .handle {
      font-size: 18px;
      color: var(--accent);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .bio {
      font-size: 17px;
      color: var(--subtext);
      max-width: 560px;
    }

    .posts-title {
      font-size: 28px;
      margin: 22px 0 20px;
      padding-left: 4px;
    }

    .posts {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .post-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px 24px 22px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .post-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.1);
    }

    .post-time {
      font-size: 14px;
      color: var(--subtext);
      margin-bottom: 10px;
    }

    .post-card h3 {
      font-size: 22px;
      margin-bottom: 10px;
      color: #111827;
    }

    .post-card p {
      color: #4b5563;
      font-size: 16px;
    }

    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .post-tags span {
      background: #eef2ff;
      color: #4338ca;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
    }

    @media (max-width: 720px) {
      .hero {
        position: static;
        flex-direction: column;
        align-items: flex-start;
        padding: 24px;
      }

      .avatar {
        width: 96px;
        height: 96px;
      }

      .profile h1 {
        font-size: 32px;
      }

      .handle {
        font-size: 16px;
      }

      .bio,
      .post-card p {
        font-size: 15px;
      }

      .post-card h3 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="avatar">
        <img src="my_photo.jpg" alt="吴子健头像" />
      </div>
      <div class="profile">
        <h1>吴子健</h1>
        <div class="handle">wzj_fragment</div>
        <p class="bio">19岁机器学习爱好者，记录人生成长和学习分享。</p>
      </div>
    </header>

    <h2 class="posts-title">帖子</h2>

    <main class="posts">
      <article class="post-card">
        <div class="post-time">2026-04-17</div>
        <h3>我的博客正式开始了</h3>
        <p>这是博客的第一篇内容。以后这里会记录我的学习轨迹、算法理解、项目心得，也会写下成长中的思考与收获。</p>
        <div class="post-tags">
          <span>日常</span>
          <span>成长</span>
        </div>
      </article>

      <article class="post-card">
        <div class="post-time">2026-04-16</div>
        <h3>最近在学什么</h3>
        <p>最近主要在继续学习机器学习相关内容，希望把理论和实践慢慢结合起来，做出一些真正属于自己的东西。</p>
        <div class="post-tags">
          <span>机器学习</span>
          <span>学习笔记</span>
        </div>
      </article>

      <article class="post-card">
        <div class="post-time">2026-04-15</div>
        <h3>关于分享这件事</h3>
        <p>我希望这个博客不只是记录结果，也记录过程。哪怕是踩坑、困惑和不成熟的想法，也都值得被认真留下。</p>
        <div class="post-tags">
          <span>思考</span>
          <span>记录</span>
        </div>
      </article>
    </main>
  </div>
</body>
</html>
